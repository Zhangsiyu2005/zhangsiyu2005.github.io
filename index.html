<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhang Siyu | Personal Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #fceeff 100%);
            color: #333;
            line-height: 1.8;
            padding: 50px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 600;
            background: linear-gradient(90deg, #7f7fd5, #a886e7, #e79cf5);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        header p {
            font-size: 1rem;
            color: #666;
        }

        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(120, 120, 255, 0.08);
        }

        .card h2 {
            font-size: 1.3rem;
            color: #7f7fd5;
            margin-bottom: 18px;
            padding-left: 12px;
            border-left: 4px solid #7f7fd5;
            font-weight: 600;
        }

        .card p, .card li {
            color: #444;
            font-size: 1rem;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 10px;
        }

        li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #7f7fd5;
            font-size: 1.2rem;
            top: -2px;
        }

        .contact {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }

        .contact a {
            padding: 10px 20px;
            background: rgba(127, 127, 213, 0.08);
            border: 1px solid rgba(127, 127, 213, 0.2);
            color: #7f7fd5;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .contact a:hover {
            background: #7f7fd5;
            color: #fff;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2rem; }
            .card { padding: 28px 22px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Zhang Siyu</h1>
            <p>University | Junior Student</p>
        </header>

        <div class="card">
            <h2>About Me</h2>
            <p>努力搬砖的大学生，环游世界的探险者。</p>
            <p style="margin-top:10px;">专注于数据科学与大数据技术专业，认真生活，认真探索，在学习与旅行中慢慢成长。</p>
        </div>

        <div class="card">
            <h2>Education</h2>
            <ul>
                <li>Shanghai Sanda University | 2023.09 – Present</li>
                <li>Major: Data Science and Big Data Technology</li>
            </ul>
        </div>

        <div class="card">
            <h2>Contact</h2>
            <div class="contact">
                <a href="mailto:zhangsiyu0066@163.com">📩 Email</a>
                <a href="https://github.com/zhangsiyu2005">💻 GitHub</a>
            </div>
        </div>
    </div>
</body>
</html>
