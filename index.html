<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhang Siyu - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft Yahei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf5 100%);
            min-height: 100vh;
            padding: 60px 20px;
            color: #333;
            line-height: 1.8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #3498db, #8e44ad);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            color: #666;
        }

        .section-title {
            font-size: 1.4rem;
            color: #3498db;
            margin-bottom: 20px;
            padding-left: 14px;
            border-left: 5px solid #3498db;
        }

        .contact {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 10px;
        }

        .contact a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 8px;
            background: #f0f7ff;
            transition: background 0.3s;
        }

        .contact a:hover {
            background: #dfeaff;
        }

        ul {
            padding-left: 22px;
        }

        li {
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card header">
            <h1>Zhang Siyu</h1>
            <p>上海杉达学院 | 大三学生 | 个人主页</p>
        </div>

        <div class="card">
            <h2 class="section-title">个人简介</h2>
            <p>就读于上海杉达学院，大三在读，热爱学习、乐于交流，持续提升专业能力与综合素养，积极探索新知识与新技能。</p>
        </div>

        <div class="card">
            <h2 class="section-title">教育经历</h2>
            <ul>
                <li>上海杉达学院 | 本科 | 2023.09 - 至今</li>
            </ul>
        </div>

        <div class="card">
            <h2 class="section-title">联系方式</h2>
            <div class="contact">
                <a href="mailto:zhangsiyu0066@163.com">📩 邮箱</a>
                <a href="https://github.com/zhangsiyu2005">💻 GitHub</a>
            </div>
        </div>
    </div>
</body>
</html>
